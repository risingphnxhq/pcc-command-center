<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOICE ENGINE — Phoenix Command Center</title>
  <style>
    :root {
      --bg: #071019;
      --panel: #0e1824;
      --line: rgba(255,255,255,.08);
      --gold: #c6a15b;
      --cyan: #63d9ff;
      --text: #f4efe5;
      --muted: rgba(244,239,229,.68);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #091018 0%, #05080c 100%);
      color: var(--text);
      padding: 32px;
    }
    .shell {
      max-width: 1200px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(14,24,36,.95), rgba(8,12,18,.93));
      padding: 28px;
    }
    .kicker {
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .22em;
      font-size: 12px;
      margin-bottom: 10px;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: .06em;
      margin: 0 0 16px;
      font-size: 48px;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
      max-width: 860px;
    }
    .panel {
      margin-top: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,.02);
    }
    .label {
      color: var(--cyan);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="kicker">Rising Phoenix Enterprises</div>
    <h1>VOICE ENGINE</h1>
    <p>
      This file was generated through PCC V5B governed build logic.
      Origin classification: PCC_ENGINE.
    </p>
    <section class="panel">
      <div class="label">Build Metadata</div>
      <p>Command Type: BUILD_PAGE</p>
      <p>Target File: voice-engine.html</p>
      <p>Operation: CREATE_FILE</p>
    </section>
  </main>
</body>
</html>
