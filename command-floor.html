<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix Command Center — Command Floor</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;600;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#05080c;
--panel:#0f1720;
--gold:#c6a15b;
--cyan:#63d9ff;
--green:#49d391;
--red:#ea7474;
--text:#f4efe5;
--muted:rgba(255,255,255,.6);
--rail:260px;
--top:80px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
background:linear-gradient(#0a0f14,#04070b);
color:var(--text);
font-family:Inter;
height:100vh;
overflow:hidden;
}

/* TOP */
.top{
height:var(--top);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.title{
font-family:Cinzel;
letter-spacing:.15em;
}

/* LAYOUT */
.wrap{
display:flex;
height:calc(100vh - var(--top));
}

/* LEFT RAIL */
.rail{
width:var(--rail);
border-right:1px solid rgba(255,255,255,.08);
padding:15px;
overflow:auto;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-bottom:8px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.05);
cursor:pointer;
text-align:left;
font-size:12px;
letter-spacing:.12em;
}
.btn.active{
border-color:var(--gold);
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* SCROLL */
.scroll{
flex:1;
overflow:auto;
padding:20px;
}

/* CARD */
.card{
background:var(--panel);
border:1px solid rgba(255,255,255,.05);
border-radius:14px;
padding:18px;
margin-bottom:18px;
}

/* COMMAND CORE */
.command-box{
width:100%;
height:220px;
background:#000;
color:#fff;
border:1px solid rgba(255,255,255,.2);
padding:12px;
font-family:"IBM Plex Mono";
}

.response{
height:160px;
background:#020305;
padding:12px;
border:1px solid rgba(99,217,255,.3);
margin-top:12px;
font-family:"IBM Plex Mono";
}

/* BUTTON GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.action{
padding:10px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
cursor:pointer;
}

/* RECEIPTS */
.receipts{
border-top:1px solid rgba(255,255,255,.08);
padding:12px;
background:#06090d;
}

.log{
padding:8px;
border-bottom:1px solid rgba(255,255,255,.06);
font-size:12px;
}
</style>
</head>

<body>

<div class="top">
<div class="title">PHOENIX COMMAND CENTER</div>
<div>FROM ASHES TO AUTHORITY</div>
</div>

<div class="wrap">

<!-- LEFT -->
<div class="rail">
<button class="btn active" data-view="command">COMMAND CORE</button>
<button class="btn" data-view="overview">OVERVIEW</button>
<button class="btn" data-view="execution">EXECUTION</button>
<button class="btn" data-view="receipts">RECEIPTS</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="scroll">

<!-- COMMAND CORE -->
<div class="view" id="command">

<div class="card">
<h3>COMMAND CORE</h3>

<textarea id="cmd" class="command-box">ENTER COMMAND...</textarea>

<div class="grid">
<button class="action" id="validate">VALIDATE</button>
<button class="action" id="simulate">SIMULATE</button>
<button class="action" id="execute">EXECUTE</button>
<button class="action" id="clear">CLEAR</button>
</div>

<div id="response" class="response">
Awaiting command...
</div>

</div>

</div>

<!-- OVERVIEW -->
<div class="view" id="overview" style="display:none">
<div class="card">SYSTEM OVERVIEW ACTIVE</div>
</div>

<!-- EXECUTION -->
<div class="view" id="execution" style="display:none">
<div class="card">EXECUTION LANE</div>
</div>

<!-- RECEIPTS -->
<div class="view" id="receipts" style="display:none">
<div class="card">RECEIPTS ARCHIVE</div>
</div>

</div>

<!-- RECEIPTS BAND -->
<div class="receipts" id="receiptFeed">
<div class="log">System Ready</div>
</div>

</div>

</div>

<script>

const views=document.querySelectorAll('.view');
const btns=document.querySelectorAll('.btn');

btns.forEach(b=>{
b.onclick=()=>{
btns.forEach(x=>x.classList.remove('active'));
b.classList.add('active');
views.forEach(v=>v.style.display='none');
document.getElementById(b.dataset.view).style.display='block';
}
});

const cmd=document.getElementById('cmd');
const res=document.getElementById('response');
const feed=document.getElementById('receiptFeed');

function log(txt){
const el=document.createElement('div');
el.className='log';
el.textContent=txt;
feed.prepend(el);
}

document.getElementById('validate').onclick=()=>{
res.textContent="VALIDATED";
log("Command validated");
};

document.getElementById('simulate').onclick=()=>{
res.textContent="SIMULATION COMPLETE";
log("Command simulated");
};

document.getElementById('execute').onclick=()=>{
res.textContent="EXECUTED";
log("Command executed");
};

document.getElementById('clear').onclick=()=>{
cmd.value='';
res.textContent="CLEARED";
};

</script>

</body>
</html>
